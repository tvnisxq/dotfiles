backend = "glx";
vsync = true;

corner-radius = 14;

shadow = true;
shadow-radius = 18;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.35;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Notification'"
];

rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'"
];

use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;

fading = true;
fade-in-step = 0.030;
fade-out-step = 0.030;

inactive-opacity = 0.85;
active-opacity = 0.90;

blur-method = "dual_kawase";
blur-strength = 3;

opacity-rule = [
    "60:class_g = 'Dunst'",
    "100:class_g = 'Brave-browser'",
    "80:class_g = 'Nemo'",
    "99:class_g = 'Rofi'"
];
